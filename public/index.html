<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人工作台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🎯</span>
                <span class="logo-text">我的工作台</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>总览</span>
                </button>
                <button class="nav-item" data-view="todos">
                    <span class="nav-icon">✅</span>
                    <span>待办事项</span>
                </button>
                <button class="nav-item" data-view="calendar">
                    <span class="nav-icon">📅</span>
                    <span>日历</span>
                </button>
                <button class="nav-item" data-view="bookmarks">
                    <span class="nav-icon">🔖</span>
                    <span>网址收藏</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <p>数据自动保存在本地</p>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <header class="header">
                <h1 id="page-title">工作台总览</h1>
                <span id="current-date"></span>
            </header>

            <div class="views-container">
                <!-- 总览 -->
                <div id="dashboard-view" class="view active">
                    <div class="dashboard-grid">
                        <div class="stat-card">
                            <div class="stat-icon">📋</div>
                            <div class="stat-value" id="todo-count">0</div>
                            <div class="stat-label">待办任务</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">✨</div>
                            <div class="stat-value" id="completed-count">0</div>
                            <div class="stat-label">已完成</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🔖</div>
                            <div class="stat-value" id="bookmark-count">0</div>
                            <div class="stat-label">收藏网址</div>
                        </div>
                        <div class="stat-card today">
                            <div class="stat-icon">📅</div>
                            <div class="stat-value" id="today-date">-</div>
                            <div class="stat-label" id="today-weekday">-</div>
                        </div>
                    </div>

                    <div class="section">
                        <h2>今日待办</h2>
                        <div id="dashboard-todos" class="preview-list"></div>
                    </div>

                    <div class="section">
                        <h2>快速访问</h2>
                        <div id="dashboard-bookmarks" class="preview-list"></div>
                    </div>
                </div>

                <!-- 待办 -->
                <div id="todos-view" class="view">
                    <div class="todo-input-section">
                        <input type="text" id="todo-input" placeholder="添加新的待办事项...">
                        <input type="date" id="todo-date">
                        <select id="todo-priority">
                            <option value="low">低优先级</option>
                            <option value="medium" selected>中优先级</option>
                            <option value="high">高优先级</option>
                        </select>
                        <button class="btn btn-primary" onclick="addTodo()">添加</button>
                    </div>
                    
                    <div class="todo-filters">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="active">进行中</button>
                        <button class="filter-btn" data-filter="completed">已完成</button>
                    </div>

                    <div class="todo-list" id="todo-list"></div>
                </div>

                <!-- 日历 -->
                <div id="calendar-view" class="view">
                    <div class="calendar-header">
                        <button class="btn" onclick="changeMonth(-1)">‹</button>
                        <h2 id="calendar-month-year"></h2>
                        <button class="btn" onclick="changeMonth(1)">›</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>

                <!-- 收藏 -->
                <div id="bookmarks-view" class="view">
                    <div class="bookmark-input-section">
                        <input type="text" id="bookmark-title" placeholder="网站名称">
                        <input type="url" id="bookmark-url" placeholder="https://...">
                        <select id="bookmark-category">
                            <option value="work">工作</option>
                            <option value="learn">学习</option>
                            <option value="entertain">娱乐</option>
                            <option value="tool">工具</option>
                            <option value="other">其他</option>
                        </select>
                        <button class="btn btn-primary" onclick="addBookmark()">添加收藏</button>
                    </div>
                    <div class="bookmark-categories" id="bookmark-list"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑弹窗 -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>编辑待办</h3>
            <input type="text" id="edit-todo-text">
            <input type="date" id="edit-todo-date">
            <select id="edit-todo-priority">
                <option value="low">低优先级</option>
                <option value="medium">中优先级</option>
                <option value="high">高优先级</option>
            </select>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
